<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AX-NEWS — Administration</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="description" content="AX-NEWS — Global tech intelligence feed">
  <meta property="og:title" content="AX-NEWS — Intelligence Portal">
  <meta property="og:description" content="AI, semiconductors, cybersecurity and more.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#000510">
  <script nonce="{{ csp_nonce }}">
    const t = localStorage.getItem('ax-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  </script>
  <link rel="stylesheet" href="style.css">
  <style nonce="{{ csp_nonce }}">
    .page-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 1.5rem; height: 56px; display: flex; align-items: center; gap: 1rem;
    }
    .page-header .logo { font-size: 1.3rem; font-weight: 800; text-decoration: none; color: var(--text); }
    .page-header .back { margin-left: auto; color: var(--muted); font-size: 0.85rem; text-decoration: none; }
    .page-header .back:hover { color: var(--accent); }
    .admin-badge {
      background: var(--accent2); color: #fff; font-size: 0.68rem;
      padding: 0.15rem 0.5rem; border-radius: 4px; font-weight: 700; letter-spacing: 0.04em;
    }

    .admin-layout { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }
    .section-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem;
    }
    .section-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.1rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .badge-admin {
      background: var(--accent); color: #fff; font-size: 0.65rem;
      padding: 0.1rem 0.4rem; border-radius: 3px; font-weight: 700;
    }

    .form-row { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.85rem; }
    .form-row label { font-size: 0.78rem; color: var(--muted); }
    .form-row input {
      padding: 0.5rem 0.75rem; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.875rem;
    }
    .form-row input:focus { outline: none; border-color: var(--accent); }
    .btn-create {
      background: var(--accent); border: none; color: #fff;
      padding: 0.5rem 1.2rem; border-radius: var(--radius);
      cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: opacity 0.15s;
    }
    .btn-create:hover { opacity: 0.85; }
    .btn-del {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 0.25rem 0.65rem; border-radius: var(--radius);
      cursor: pointer; font-size: 0.78rem; transition: all 0.12s;
    }
    .btn-del:hover { border-color: var(--danger); color: var(--danger); }
    .alert { padding: 0.6rem 0.85rem; border-radius: var(--radius); font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .alert.success { background: rgba(34,197,94,0.12); border: 1px solid #22c55e; color: #22c55e; }
    .alert.error   { background: rgba(239,68,68,0.12);  border: 1px solid var(--danger); color: var(--danger); }
    .hdr-logo-img { height:28px; width:auto; object-fit:contain; vertical-align:middle; }
    .header-user { font-size:0.85rem; color:var(--muted); }
    #pendingSection { display:none; margin-bottom:32px; }
    .pending-title { font-size:1rem; font-weight:700; color:#ff6b35; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .pending-count { background:#ff6b35; color:#fff; font-size:.7rem; padding:2px 8px; border-radius:10px; }
    .pending-thead-row { font-size:.75rem; color:var(--muted,#4a7aa8); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border,#1e1e2e); }
    .pending-th { padding:8px 12px; text-align:left; }
    .td-loading { color:var(--muted); padding:1rem; }
    .td-no-users { color:var(--muted); }
    .pending-row { border-bottom:1px solid var(--border,#1e1e2e); font-size:.85rem; }
    .pending-cell { padding:10px 12px; color:var(--muted); }
    .pending-cell-strong { padding:10px 12px; font-weight:700; }
    .pending-cell-action { padding:10px 12px; }
    .pending-actions { display:flex; gap:8px; }
    .btn-approve { padding:5px 14px; background:#00e676; color:#000; border:none; border-radius:6px; font-weight:700; cursor:pointer; font-size:.78rem; }
    .btn-reject  { padding:5px 14px; background:#ff4d6d; color:#fff; border:none; border-radius:6px; font-weight:700; cursor:pointer; font-size:.78rem; }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="/" class="logo"><picture>
      <source srcset="/logo.webp" type="image/webp">
      <img src="/logo.png" alt="AXIOM" width="56" height="28" class="hdr-logo-img">
    </picture></a>
    <span class="admin-badge">ADMIN</span>
    <span id="headerUser" class="header-user"></span>
    <a href="/" class="back">← Retour au portail</a>
  </header>

  <div class="admin-layout">
    <!-- Pending approvals -->
    <div id="pendingSection">
      <h2 class="pending-title">
        ⏳ Pending Approvals
        <span id="pendingCount" class="pending-count">0</span>
      </h2>
      <table id="pendingTable">
        <thead>
          <tr class="pending-thead-row">
            <th class="pending-th">ID</th>
            <th class="pending-th">Username</th>
            <th class="pending-th">Email</th>
            <th class="pending-th">Registered</th>
            <th class="pending-th">Actions</th>
          </tr>
        </thead>
        <tbody id="pendingBody"></tbody>
      </table>
    </div>

    <!-- User list -->
    <div class="section-card">
      <h2>Utilisateurs</h2>
      <table id="userTable">
        <thead>
          <tr>
            <th>ID</th><th>Nom</th><th>Email</th>
            <th>Articles lus</th><th>Créé le</th><th>Rôle</th><th></th>
          </tr>
        </thead>
        <tbody id="userTbody"><tr><td colspan="7" class="td-loading">Chargement…</td></tr></tbody>
      </table>
    </div>

    <!-- Create user -->
    <div class="section-card">
      <h2>Créer un utilisateur</h2>
      <div id="createAlert" class="alert"></div>
      <div class="form-row"><label>Nom d'utilisateur *</label><input type="text" id="newUsername" autocomplete="off"></div>
      <div class="form-row"><label>Email</label><input type="email" id="newEmail" autocomplete="off"></div>
      <div class="form-row"><label>Mot de passe *</label><input type="password" id="newPassword" autocomplete="new-password"></div>
      <button class="btn-create" id="btnCreate">Créer</button>
    </div>
  </div>

  <script nonce="{{ csp_nonce }}">
    const API = '/api';
    let currentUserId = null;

    async function api(path, opts = {}) {
      const res = await fetch(API + path, { credentials: 'same-origin', ...opts });
      if (res.status === 401) { window.location.href = '/login.html'; return null; }
      if (res.status === 403) { window.location.href = '/'; return null; }
      if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d.detail || res.statusText); }
      return res.json();
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
    }

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg; el.className = `alert ${type}`; el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function loadUsers() {
      const users = await api('/users');
      if (!users) return;
      const tbody = document.getElementById('userTbody');
      if (!users.length) { tbody.innerHTML = '<tr><td colspan="7" class="td-no-users">Aucun utilisateur.</td></tr>'; return; }
      tbody.innerHTML = '';
      users.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.id}</td>
          <td>${escHtml(u.username)}</td>
          <td>${escHtml(u.email||'—')}</td>
          <td>${u.articles_read}</td>
          <td>${fmtDate(u.created_at)}</td>
          <td>${u.is_admin ? '<span class="badge-admin">ADMIN</span>' : 'Utilisateur'}</td>
          <td>${u.id !== currentUserId ? `<button class="btn-del" data-id="${u.id}" data-name="${escHtml(u.username)}">Supprimer</button>` : ''}</td>
        `;
        if (u.id !== currentUserId) {
          tr.querySelector('.btn-del').addEventListener('click', async function() {
            if (!confirm(`Supprimer l'utilisateur « ${this.dataset.name} » ? Cette action est irréversible.`)) return;
            try {
              await api(`/users/${this.dataset.id}`, { method: 'DELETE' });
              loadUsers();
            } catch(e) { alert('Erreur : ' + e.message); }
          });
        }
        tbody.appendChild(tr);
      });
    }

    document.getElementById('btnCreate').addEventListener('click', async () => {
      const username = document.getElementById('newUsername').value.trim();
      const email    = document.getElementById('newEmail').value.trim();
      const password = document.getElementById('newPassword').value;
      if (!username || !password) { showAlert('createAlert', 'Nom et mot de passe requis.', 'error'); return; }
      try {
        const u = await api('/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email: email || null, password }),
        });
        if (!u) return;
        showAlert('createAlert', `Utilisateur « ${u.username} » créé (id ${u.id}).`, 'success');
        document.getElementById('newUsername').value = '';
        document.getElementById('newEmail').value    = '';
        document.getElementById('newPassword').value = '';
        loadUsers();
      } catch(e) { showAlert('createAlert', e.message, 'error'); }
    });

    async function loadPendingUsers() {
      try {
        const res = await fetch('/api/admin/pending-users', {credentials:'include'});
        if (!res.ok) return;
        const users = await res.json();
        const section = document.getElementById('pendingSection');
        const count = document.getElementById('pendingCount');
        const tbody = document.getElementById('pendingBody');
        if (!section || !tbody) return;
        if (users.length > 0) {
          section.style.display = 'block';
          count.textContent = users.length;
          tbody.innerHTML = users.map(u => `
            <tr class="pending-row">
              <td class="pending-cell">${u.id}</td>
              <td class="pending-cell-strong">${escHtml(u.username)}</td>
              <td class="pending-cell">${escHtml(u.email||'—')}</td>
              <td class="pending-cell">${u.created_at?new Date(u.created_at).toLocaleDateString('en-GB'):'—'}</td>
              <td class="pending-cell-action">
                <div class="pending-actions">
                  <button onclick="approveUser(${u.id})" class="btn-approve">✓ Approve</button>
                  <button onclick="rejectUser(${u.id})" class="btn-reject">✗ Reject</button>
                </div>
              </td>
            </tr>`).join('');
        } else {
          section.style.display = 'none';
        }
      } catch(e) { console.warn('Pending error:', e); }
    }

    async function approveUser(userId) {
      const res = await fetch(`/api/admin/users/${userId}/approve`,
        {method:'POST', credentials:'include'});
      if (res.ok) { showToast('User approved ✓', 'success'); loadPendingUsers(); loadUsers(); }
    }

    async function rejectUser(userId) {
      if (!confirm('Reject and delete this user?')) return;
      const res = await fetch(`/api/admin/users/${userId}/reject`,
        {method:'POST', credentials:'include'});
      if (res.ok) { showToast('User rejected', 'error'); loadPendingUsers(); }
    }

    function showToast(msg, type) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = `position:fixed;top:20px;right:20px;z-index:9999;
        padding:12px 20px;border-radius:8px;font-weight:700;font-size:.85rem;
        background:${type==='success'?'#00e676':'#ff4d6d'};
        color:${type==='success'?'#000':'#fff'};
        box-shadow:0 4px 16px rgba(0,0,0,.4);transition:opacity .3s`;
      document.body.appendChild(t);
      setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)}, 2500);
    }

    (async () => {
      const me = await api('/auth/me');
      if (!me) return;
      currentUserId = me.id;
      document.getElementById('headerUser').textContent = me.username;
      loadUsers();
      loadPendingUsers();
      setInterval(loadPendingUsers, 30000);
    })();
  </script>
</body>
</html>
