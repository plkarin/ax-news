<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AX-NEWS — Profile</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="description" content="AX-NEWS — Global tech intelligence feed">
  <meta property="og:title" content="AX-NEWS — Intelligence Portal">
  <meta property="og:description" content="AI, semiconductors, cybersecurity and more.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#000510">
  <link rel="stylesheet" href="style.css">
  <style nonce="{{ csp_nonce }}">
    body { overflow: auto; height: auto; }
    #app { height: auto; min-height: 100vh; display: block; }
    .page-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 1.5rem; height: 56px; display: flex; align-items: center; gap: 1rem;
      position: sticky; top: 0; z-index: 10;
    }
    .page-header .logo { font-size: 1.3rem; font-weight: 900; text-decoration: none; color: var(--accent); }
    .page-header .logo span { color: var(--text); }
    .page-header .back { margin-left: auto; color: var(--muted); font-size: 0.85rem; text-decoration: none; }
    .page-header .back:hover { color: var(--accent); }

    .profile-layout { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    .tabs { display: flex; gap: 0.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      padding: 0.6rem 1.1rem; cursor: pointer; font-size: 0.9rem;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover  { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-num   { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

    .form-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    .form-section h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 1rem; }
    .form-row { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.85rem; }
    .form-row label { font-size: 0.78rem; color: var(--muted); }
    .form-row input, .form-row select {
      padding: 0.5rem 0.75rem; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 0.875rem;
    }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--accent); }
    .btn-save {
      background: var(--accent); border: none; color: #fff;
      padding: 0.5rem 1.2rem; border-radius: 6px; cursor: pointer;
      font-size: 0.875rem; font-weight: 600; transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }

    .domain-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
    .domain-chip {
      padding: 0.3rem 0.75rem; border-radius: 20px; background: var(--surface2); color: var(--muted);
      font-size: 0.78rem; cursor: pointer; border: none; transition: background 0.12s, color 0.12s;
    }
    .domain-chip:hover  { background: var(--accent); color: #fff; }
    .domain-chip.active { background: var(--accent); color: #fff; }
    .k-search { flex: 1; max-width: 260px; padding: 0.4rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; }
    .k-search:focus { outline: none; border-color: var(--accent); }
    .k-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .k-domain-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; background: var(--accent); color: #fff; }
    .k-gap      { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; }
    .k-resolved { font-size: 0.875rem; line-height: 1.55; margin-bottom: 0.5rem; }
    .k-source   { font-size: 0.72rem; color: var(--muted); }
    .k-actions  { margin-top: 0.5rem; }

    .feed-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }
    .feed-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; display: flex; align-items: center; gap: 0.75rem; }
    .feed-item.inactive { opacity: 0.45; }
    .feed-info { flex: 1; min-width: 0; }
    .feed-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feed-url  { font-size: 0.72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feed-cat  { background: var(--surface2); border-radius: 4px; padding: 0.15rem 0.45rem; font-size: 0.68rem; white-space: nowrap; }
    .btn-sm { padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.78rem; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--muted); transition: all 0.12s; white-space: nowrap; }
    .btn-sm:hover       { border-color: var(--accent); color: var(--accent); }
    .btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }

    .alert { padding: 0.6rem 0.85rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .alert.success { background: rgba(34,197,94,0.12); border: 1px solid #22c55e; color: #22c55e; }
    .alert.error   { background: rgba(239,68,68,0.12);  border: 1px solid var(--danger); color: var(--danger); }

    .theme-switcher { display: flex; gap: 6px; align-items: center; margin-left:8px; }
    .hdr-logo-img { height:28px; width:auto; object-fit:contain; vertical-align:middle; }
    .header-user { font-size:0.85rem; color:var(--muted); }
    .theme-dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .theme-dot:hover, .theme-dot.active { border-color: var(--text); transform: scale(1.2); }
    .theme-dot[data-theme="dark"]   { background: #1a1a2e; }
    .theme-dot[data-theme="light"]  { background: #e2e8f0; }
    .theme-dot[data-theme="green"]  { background: #22c55e; }
    .theme-dot[data-theme="blue"]   { background: #3b82f6; }
    .theme-dot[data-theme="purple"] { background: #a855f7; }
  </style>
</head>
<body>
<div id="app">
  <header class="page-header">
    <a href="/" class="logo"><picture>
      <source srcset="/logo.webp" type="image/webp">
      <img src="/logo.png" alt="AXIOM" width="56" height="28" class="hdr-logo-img">
    </picture></a>
    <span id="headerUser" class="header-user"></span>
    <div class="theme-switcher">
      <div class="theme-dot" data-theme="dark"   title="Dark"></div>
      <div class="theme-dot" data-theme="light"  title="Light"></div>
      <div class="theme-dot" data-theme="green"  title="Green"></div>
      <div class="theme-dot" data-theme="blue"   title="Blue"></div>
      <div class="theme-dot" data-theme="purple" title="Purple"></div>
    </div>
    <a href="/" class="back">← Back to portal</a>
  </header>

  <div class="profile-layout">
    <div class="tabs">
      <button class="tab-btn active" data-tab="profile">My Profile</button>
      <button class="tab-btn" data-tab="knowledge">Knowledge Base</button>
      <button class="tab-btn" data-tab="feeds">My Feeds</button>
    </div>

    <!-- Tab: Profile -->
    <div class="tab-panel active" id="tab-profile">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="statRead">—</div><div class="stat-label">Articles read</div></div>
        <div class="stat-card"><div class="stat-num" id="statKnowledge">—</div><div class="stat-label">Gaps resolved</div></div>
        <div class="stat-card"><div class="stat-num" id="statFeeds">—</div><div class="stat-label">Active feeds</div></div>
      </div>
      <div class="form-section">
        <h3>Account</h3>
        <div class="form-row"><label>Username</label><input type="text" id="profUsername" disabled></div>
        <div class="form-row"><label>Email</label><input type="text" id="profEmail" disabled></div>
      </div>
      <div class="form-section">
        <h3>Change Password</h3>
        <div id="pwAlert" class="alert"></div>
        <div class="form-row"><label>Current password</label><input type="password" id="pwCurrent"></div>
        <div class="form-row"><label>New password</label><input type="password" id="pwNew"></div>
        <div class="form-row"><label>Confirm new password</label><input type="password" id="pwConfirm"></div>
        <button class="btn-save" id="btnChangePw">Update password</button>
      </div>
    </div>

    <!-- Tab: Knowledge Base -->
    <div class="tab-panel" id="tab-knowledge">
      <div class="domain-filter" id="domainFilter">
        <input type="text" class="k-search" id="kSearch" placeholder="Search knowledge…">
      </div>
      <div id="knowledgeEntries"></div>
    </div>

    <!-- Tab: Feeds -->
    <div class="tab-panel" id="tab-feeds">
      <div class="feed-list" id="feedList"></div>
      <div class="form-section">
        <h3>Add a Feed</h3>
        <div id="feedAlert" class="alert"></div>
        <div class="form-row"><label>Feed name</label><input type="text" id="feedName" placeholder="e.g. The Verge"></div>
        <div class="form-row"><label>RSS URL</label><input type="text" id="feedUrl" placeholder="https://…"></div>
        <div class="form-row">
          <label>Category</label>
          <select id="feedCat"><option value="">— None —</option></select>
        </div>
        <button class="btn-save" id="btnAddFeed">Add feed</button>
      </div>
    </div>
  </div>
</div>

<script nonce="{{ csp_nonce }}">
  const API = '/api';
  let allKnowledge = {};
  let activeKDomain = '';

  // ── Theme ───────────────────────────────────────────────────────────────────
  function initTheme() {
    const saved = localStorage.getItem('ax-theme') || 'dark';
    applyTheme(saved);
  }
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('ax-theme', theme);
    document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.theme === theme));
  }
  document.querySelectorAll('.theme-dot').forEach(d => d.addEventListener('click', () => applyTheme(d.dataset.theme)));
  initTheme();

  async function api(path, opts = {}) {
    const res = await fetch(API + path, { credentials: 'same-origin', ...opts });
    if (res.status === 401) { window.location.href = '/login.html'; return null; }
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.detail || res.statusText); }
    return res.json();
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }
  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = `alert ${type}`; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  // ── Tabs ────────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── Profile ─────────────────────────────────────────────────────────────────
  async function loadProfile() {
    const [me, prof] = await Promise.all([api('/auth/me'), api('/profile')]);
    if (!me || !prof) return;
    document.getElementById('headerUser').textContent = me.username;
    document.getElementById('profUsername').value = prof.username;
    document.getElementById('profEmail').value    = prof.email || '';
    document.getElementById('statRead').textContent      = prof.articles_read;
    document.getElementById('statKnowledge').textContent = prof.knowledge_count;
    document.getElementById('statFeeds').textContent     = prof.feeds_count;
  }

  document.getElementById('btnChangePw').addEventListener('click', async () => {
    const cur  = document.getElementById('pwCurrent').value;
    const nw   = document.getElementById('pwNew').value;
    const conf = document.getElementById('pwConfirm').value;
    if (nw !== conf) { showAlert('pwAlert', 'Passwords do not match.', 'error'); return; }
    try {
      await api('/profile/password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ current_password: cur, new_password: nw }),
      });
      showAlert('pwAlert', 'Password updated successfully.', 'success');
      ['pwCurrent','pwNew','pwConfirm'].forEach(id => document.getElementById(id).value = '');
    } catch (e) { showAlert('pwAlert', e.message, 'error'); }
  });

  // ── Knowledge ───────────────────────────────────────────────────────────────
  async function loadKnowledge() {
    const data = await api('/knowledge/full');
    if (!data) return;
    allKnowledge = data;
    const domains = Object.keys(data).sort();
    const filter = document.getElementById('domainFilter');
    filter.querySelectorAll('.domain-chip').forEach(c => c.remove());

    const allChip = document.createElement('button');
    allChip.className = 'domain-chip active';
    allChip.textContent = 'All';
    allChip.addEventListener('click', () => { activeKDomain = ''; renderKnowledge(); setChip(allChip); });
    filter.insertBefore(allChip, filter.querySelector('.k-search'));

    domains.forEach(d => {
      const chip = document.createElement('button');
      chip.className = 'domain-chip'; chip.textContent = d;
      chip.addEventListener('click', () => { activeKDomain = d; renderKnowledge(); setChip(chip); });
      filter.insertBefore(chip, filter.querySelector('.k-search'));
    });
    renderKnowledge();
  }

  function setChip(el) {
    document.querySelectorAll('.domain-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  function renderKnowledge() {
    const q   = (document.getElementById('kSearch').value || '').toLowerCase();
    const box = document.getElementById('knowledgeEntries');
    const src = activeKDomain ? { [activeKDomain]: allKnowledge[activeKDomain] } : allKnowledge;
    box.innerHTML = '';
    let total = 0;
    for (const [domain, entries] of Object.entries(src)) {
      const filtered = entries.filter(e =>
        !q || (e.gap_identified||'').toLowerCase().includes(q) ||
              (e.gap_resolved||'').toLowerCase().includes(q) ||
              (e.article_title||'').toLowerCase().includes(q)
      );
      filtered.forEach(e => {
        total++;
        const div = document.createElement('div');
        div.className = 'k-entry';
        div.innerHTML = `
          <span class="k-domain-badge">${esc(domain)}</span>
          ${e.gap_identified ? `<div class="k-gap">Gap: ${esc(e.gap_identified)}</div>` : ''}
          <div class="k-resolved">${esc(e.gap_resolved || '')}</div>
          <div class="k-source">
            ${e.article_title ? `📰 ${esc(e.article_title)}` : ''}
            ${e.article_source ? ` — ${esc(e.article_source)}` : ''}
            ${e.created_at ? ` · ${fmtDate(e.created_at)}` : ''}
          </div>
          ${e.id ? `<div class="k-actions"><button class="delete-btn" onclick="deleteKnowledge(${e.id}, this)">Delete</button></div>` : ''}
        `;
        box.appendChild(div);
      });
    }
    if (!total) box.innerHTML = '<div class="empty-state">No knowledge entries found.</div>';
  }

  document.getElementById('kSearch').addEventListener('input', renderKnowledge);

  async function deleteKnowledge(id, btn) {
    if (!confirm('Delete this knowledge entry?')) return;
    try {
      await api(`/knowledge/${id}`, { method: 'DELETE' });
      btn.closest('.k-entry').remove();
    } catch (e) { alert('Error: ' + e.message); }
  }

  // ── Feeds ───────────────────────────────────────────────────────────────────
  async function loadFeeds() {
    const [feeds, cats] = await Promise.all([api('/feeds'), api('/categories')]);
    if (!feeds) return;
    renderFeeds(feeds);
    const sel = document.getElementById('feedCat');
    sel.innerHTML = '<option value="">— None —</option>';
    (cats || []).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c; sel.appendChild(opt);
    });
  }

  function renderFeeds(feeds) {
    const list = document.getElementById('feedList');
    if (!feeds.length) { list.innerHTML = '<div class="empty-state">No feeds configured.</div>'; return; }
    list.innerHTML = '';
    feeds.forEach(f => {
      const div = document.createElement('div');
      div.className = 'feed-item' + (f.active === false ? ' inactive' : '');
      div.innerHTML = `
        <div class="feed-info">
          <div class="feed-name">${esc(f.name)}</div>
          ${f.url ? `<div class="feed-url">${esc(f.url)}</div>` : ''}
        </div>
        ${f.category ? `<span class="feed-cat">${esc(f.category)}</span>` : ''}
        ${f.id ? `<button class="btn-sm danger" data-id="${f.id}" data-name="${esc(f.name)}">Remove</button>` : ''}
      `;
      if (f.id) {
        div.querySelector('.btn-sm.danger').addEventListener('click', async function() {
          if (!confirm(`Remove feed "${this.dataset.name}"?`)) return;
          try {
            await api(`/feeds/${this.dataset.id}/permanent`, { method: 'DELETE' });
            loadFeeds();
          } catch (e) { showAlert('feedAlert', e.message, 'error'); }
        });
      }
      list.appendChild(div);
    });
  }

  document.getElementById('btnAddFeed').addEventListener('click', async () => {
    const name = document.getElementById('feedName').value.trim();
    const url  = document.getElementById('feedUrl').value.trim();
    const cat  = document.getElementById('feedCat').value;
    if (!name || !url) { showAlert('feedAlert', 'Name and URL are required.', 'error'); return; }
    try {
      await api('/feeds', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, url, category: cat || null }),
      });
      document.getElementById('feedName').value = '';
      document.getElementById('feedUrl').value  = '';
      showAlert('feedAlert', 'Feed added successfully.', 'success');
      loadFeeds();
    } catch (e) { showAlert('feedAlert', e.message, 'error'); }
  });

  // ── Init ────────────────────────────────────────────────────────────────────
  (async () => {
    const me = await api('/auth/me');
    if (!me) return;
    await Promise.all([loadProfile(), loadKnowledge(), loadFeeds()]);
  })();
</script>
</body>
</html>
